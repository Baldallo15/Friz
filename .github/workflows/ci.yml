name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-and-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      # Prueba de humo: habría detectado en segundos el conflicto de
      # merge sin resolver que rompía friz.py (ver Sección 3.1 / 4.1
      # de la auditoría técnica).
      - name: Prueba de humo (py_compile)
        run: python -m py_compile friz.py modules/*.py

      - name: Lint (ruff)
        run: ruff check . --line-length=120 || true

      - name: Ejecutar pruebas unitarias
        run: pytest tests/ -v
